    <!-- לוגו בלשונית הדפדפן -->
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --base-font-size: 16px; }
        html { font-size: var(--base-font-size); transition: font-size 0.3s ease; }
        body { font-family: 'Assistant', sans-serif; overflow-x: hidden; scroll-behavior: smooth; background-color: #FCFBFA; color: #1A1A1A; transition: background 0.3s, color 0.3s; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* גלריה אינסופית - לופ מושלם ומהיר */
        .marquee-container { 
            overflow: hidden; 
            width: 100%;
            padding: 2.5rem 0; 
            background: #fff; 
            position: relative;
            z-index: 10;
            display: flex;
        }
        .marquee-content { 
            display: flex; 
            gap: 20px;
            animation: scroll-left 45s linear infinite; /* מהירות מאוזנת */
            flex-shrink: 0;
            will-change: transform;
        }
        .gallery-item {
            height: 400px;
            width: 300px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            flex-shrink: 0;
            background-color: #f7f7f7;
        }
        
        /* חישוב המעבר -50% בגלל השכפול ב-JS */
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* נגישות */
        .large-text-active { --base-font-size: 20px; }
        .high-contrast-active { background-color: #000 !important; color: #fff !important; }
        .high-contrast-active .bg-white, .high-contrast-active .form-container, .high-contrast-active .marquee-container { background-color: #1a1a1a !important; color: #fff !important; border-color: #fff !important; }
        .highlight-active a, .highlight-active button { outline: 3px solid #D4AF37 !important; outline-offset: 4px !important; }

        /* תפריט נגישות */
        .acc-menu-open #accMainBtn { transform: rotate(180deg); }
        .acc-option { position: absolute; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); opacity: 0; pointer-events: none; transform: scale(0); }
        .acc-menu-open .acc-option { opacity: 1; pointer-events: auto; transform: scale(1); }
        .acc-menu-open .opt-1 { transform: translate(0, 75px); }
        .acc-menu-open .opt-2 { transform: translate(65px, 45px); }
        .acc-menu-open .opt-3 { transform: translate(75px, -20px); }

        /* כפתור וואטסאפ צף עם הטקסט המבוקש */
        .whatsapp-float { 
            position: fixed; 
            bottom: 30px; 
            left: 30px; 
            width: 65px; 
            height: 65px; 
            border-radius: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 500; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .whatsapp-float:hover { transform: scale(1.1); background-color: #D4AF37 !important; }

        .social-link {
            position: relative;
            z-index: 100;
            display: inline-block;
        }

        @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 1.2s ease-out forwards; }
    </style>
</head>

    <!-- Form Section -->
    <section id="contact-form" class="py-20 px-6 max-w-6xl mx-auto">
        <div class="form-container bg-white p-8 md:p-20 rounded-[60px] shadow-2xl border border-gray-100/50">
            <h2 class="text-4xl md:text-6xl font-serif italic text-center mb-16">שריינו מקום</h2>
            <form onsubmit="sendToWhatsapp(event)" class="space-y-12">

                    <div class="border-b py-4"><label class="text-[#D4AF37] text-xs font-bold uppercase block">שם מלא</label><input type="text" id="name" required class="w-full bg-transparent text-xl outline-none" placeholder="איך קוראים לכם?"></div>
                    <div class="border-b py-4"><label class="text-[#D4AF37] text-xs font-bold uppercase block text-right">טלפון</label><input type="tel" id="phone" required class="w-full bg-transparent text-xl outline-none text-left" placeholder="050-0000000"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                    <div class="border-b py-4"><label class="text-[#D4AF37] text-xs font-bold uppercase block">סוג אירוע</label><select id="eventType" required class="w-full bg-transparent py-2 outline-none text-lg"><option value="" disabled selected>בחר סוג אירוע</option><option>חתונה</option><option>בר/בת מצווה</option><option>יום הולדת</option><option>אירוע עסקי</option><option>אחר</option></select></div>

                </div>
                <!-- שדה מלל חופשי -->

                    <label class="text-[#D4AF37] text-xs font-bold uppercase block">ספרו לנו עוד (מלל חופשי)</label>

    <script>
        lucide.createIcons();
        
        // לופ אינסופי מושלם - שכפול המרקי ב-JS
        const marqueeInner = document.getElementById('marquee-inner');
        marqueeInner.innerHTML += marqueeInner.innerHTML; // שכפול ראשון
        
        // בניית התאריכים
        const daySel = document.getElementById('day'), monthSel = document.getElementById('month'), yearSel = document.getElementById('year');
        for(let i=1; i<=31; i++) daySel.options.add(new Option(i, i));
        for(let i=1; i<=12; i++) monthSel.options.add(new Option(i, i));
        const currYear = new Date().getFullYear();
        for(let i=currYear; i<=currYear+3; i++) yearSel.options.add(new Option(i, i));

        // נגישות
        function toggleAccMenu() { document.getElementById('accWrapper').classList.toggle('acc-menu-open'); }
        function toggleLargeText() { document.documentElement.classList.toggle('large-text-active'); }
        function toggleContrast() { document.body.classList.toggle('high-contrast-active'); }
        function toggleHighlight() { document.body.classList.toggle('highlight-active'); }

        // שליחה לוואטסאפ מהטופס
        function sendToWhatsapp(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const event = document.getElementById('eventType').value;
            const guests = document.getElementById('guests').value || 'לא צוין';
            const dateStr = `${daySel.value}/${monthSel.value}/${yearSel.value}`;
            const notes = document.getElementById('notes').value;

            let msg = `✨ *בקשה חדשה מהאתר* ✨\n\n`;
            msg += `👤 *שם:* ${name}\n`;
            msg += `🎉 *אירוע:* ${event}\n`;
            msg += `👥 *מוזמנים:* ${guests}\n`;
            msg += `📅 *תאריך:* ${dateStr}\n`;
            if(notes) msg += `📝 *מידע נוסף:* ${notes}`;

            window.open(`https://wa.me/972546056180?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
