<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Box | בוטיק עמדות צילום</title>
    
    <link rel="icon" type="image/jpeg" href="https://files.oaiusercontent.com/file-m06i8L3qAnQe6qQ2FndVpW?se=2026-05-03T15%3A17%3A50Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D604800%2C%20immutable%2C%20private&rscd=attachment%3B%20filename%3D4585c54c-811c-43f1-9c3f-c1f0b0051e7f.webp&sig=q4yq/R5Zf74/e0S7A7oE5V7aF8Y9U6l8X6n3g3o3z8E%3D">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --base-font-size: 16px; }
        html { font-size: var(--base-font-size); transition: font-size 0.3s ease; }
        body { font-family: 'Assistant', sans-serif; overflow-x: hidden; scroll-behavior: smooth; background-color: #FCFBFA; color: #1A1A1A; transition: background 0.3s, color 0.3s; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* גלריה זזה חלקה ואינסופית */
        .marquee-container { 
            overflow: hidden; 
            white-space: nowrap; 
            padding: 3rem 0; 
            background: #fff; 
            margin: 2rem 0; 
            position: relative;
            display: flex; 
        }

        .marquee-content { 
            display: flex; 
            gap: 2rem; 
            animation: scroll-right 30s linear infinite; 
            flex-shrink: 0;
        }

        @keyframes scroll-right {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        .marquee-container:hover .marquee-content {
            animation-play-state: paused;
        }

        .gallery-item { 
            width: 350px; 
            height: 450px; 
            border-radius: 24px; 
            object-fit: cover; 
            flex-shrink: 0; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
        }

        /* נגישות */
        .large-text-active { --base-font-size: 20px; }
        .high-contrast-active { background-color: #000 !important; color: #fff !important; }
        .high-contrast-active .bg-white, .high-contrast-active .marquee-container { background-color: #1a1a1a !important; color: #fff !important; border-color: #fff !important; }
        .highlight-active a, .highlight-active button:not(#accMainBtn) { outline: 3px solid #D4AF37 !important; outline-offset: 4px !important; }

        .hero-tag-container { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-bottom: 1.5rem; }
        .gold-line { height: 1px; width: 45px; background: linear-gradient(90deg, transparent, #D4AF37, transparent); }

        /* תפריט נגישות */
        .acc-menu-open #accMainBtn { transform: rotate(180deg); }
        .acc-option { position: absolute; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); opacity: 0; pointer-events: none; transform: scale(0); }
        .acc-menu-open .acc-option { opacity: 1; pointer-events: auto; transform: scale(1); }
        .acc-menu-open .opt-1 { transform: translate(0, 75px); }
        .acc-menu-open .opt-2 { transform: translate(65px, 45px); }
        .acc-menu-open .opt-3 { transform: translate(75px, -20px); }

        @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 1.2s ease-out forwards; }

        .whatsapp-float { 
            position: fixed; 
            bottom: 30px; 
            left: 30px; 
            width: 60px; 
            height: 60px; 
            border-radius: 50px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            z-index: 400; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .whatsapp-float:hover { transform: scale(1.1) rotate(5deg); background-color: #D4AF37 !important; }
    </style>
</head>
<body>

    <a href="https://wa.me/972546056180?text=היי%20מה%20נשמע%20רציתי%20לשמוע%20יותר%20על%20החבילות%20שלכם" 
       class="whatsapp-float" 
       style="background-color: #1A1A1A !important; color: #FFFFFF !important;"
       target="_blank">
        <i data-lucide="message-circle" style="width: 32px; height: 32px;"></i>
    </a>

    <div id="accWrapper" class="fixed top-24 left-6 z-[300] flex flex-col items-center">
        <button onclick="toggleAccMenu()" id="accMainBtn" class="w-14 h-14 rounded-full shadow-2xl bg-[#1A1A1A] text-white flex items-center justify-center transition-all duration-500 border border-white/20">
            <i data-lucide="accessibility"></i>
        </button>
        <button onclick="toggleLargeText()" title="הגדלת טקסט" class="acc-option opt-1 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border border-gray-100 hover:bg-[#D4AF37] hover:text-white"><b>A+</b></button>
        <button onclick="toggleContrast()" title="ניגודיות גבוהה" class="acc-option opt-2 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border border-gray-100 hover:bg-[#D4AF37] hover:text-white"><i data-lucide="contrast" size="18"></i></button>
        <button onclick="toggleHighlight()" title="הדגשת קישורים" class="acc-option opt-3 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border border-gray-100 hover:bg-[#D4AF37] hover:text-white"><i data-lucide="eye" size="18"></i></button>
    </div>

    <header class="fixed top-0 left-0 right-0 z-[150] px-4 py-6 md:px-12">
        <nav class="max-w-7xl mx-auto flex justify-between items-center p-4 px-10 rounded-full bg-white/70 backdrop-blur-xl border border-gray-100 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="text-[#D4AF37]">
                    <svg viewBox="0 0 100 100" class="h-10 w-10" fill="none" stroke="currentColor"><path d="M50 45 L35 75 M50 45 L65 75 M42 75 L58 75" stroke-width="2.5" stroke-linecap="round"/><rect x="32" y="30" width="36" height="22" rx="3" stroke-width="2.5"/><circle cx="50" cy="41" r="6" stroke-width="2.5"/></svg>
                </div>
                <div class="flex flex-col">
                    <span class="font-black uppercase leading-none">Snap Box</span>
                    <span class="text-[10px] font-bold tracking-[0.2em] uppercase mt-1 text-gray-500">פשוט רגעים יפים מעץ טבעי</span>
                </div>
            </div>
            <button onclick="document.getElementById('contact-form').scrollIntoView({behavior:'smooth'})" class="bg-[#1A1A1A] text-white rounded-full font-black px-6 py-2 text-[11px] hover:bg-[#D4AF37] transition-all">שריינו תאריך</button>
        </nav>
    </header>

    <section class="relative pt-64 pb-20 px-6 max-w-7xl mx-auto text-center animate-fade-in">
        <div class="hero-tag-container">
            <div class="gold-line"></div>
            <span class="font-bold uppercase tracking-[0.4em] text-sm text-[#D4AF37]">בוטיק עמדות צילום</span>
            <div class="gold-line"></div>
        </div>
        <h1 class="text-6xl md:text-8xl italic font-serif leading-[1.1]">היופי שברגע <br /><span class="text-[#D4AF37] not-italic font-light">מעץ טבעי.</span></h1>
    </section>

    <div class="marquee-container">
        <div class="marquee-content">
            <video src="document_6035350110911601691.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5990337496899849480_y.jpg" class="gallery-item">
            <video src="document_6035350110911601692.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_6035350111371595162_y.jpg" class="gallery-item">
            <video src="document_6035350110911601689.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5949512990937779361_y.jpg" class="gallery-item">
        </div>
        <div class="marquee-content" aria-hidden="true">
            <video src="document_6035350110911601691.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5990337496899849480_y.jpg" class="gallery-item">
            <video src="document_6035350110911601692.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_6035350111371595162_y.jpg" class="gallery-item">
            <video src="document_6035350110911601689.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5949512990937779361_y.jpg" class="gallery-item">
        </div>
    </div>

    <section id="contact-form" class="py-20 px-6 max-w-6xl mx-auto">
        <div class="bg-white p-8 md:p-20 rounded-[60px] shadow-2xl border border-gray-100/50">
            <h2 class="text-4xl md:text-6xl font-serif italic text-center mb-16">שריינו מקום</h2>
            <form onsubmit="sendToWhatsapp(event)" class="space-y-12">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="border-b py-4"><label class="text-[#D4AF37] text-xs font-bold uppercase">שם מלא</label><input type="text" id="name" required class="w-full bg-transparent text-xl outline-none" placeholder="איך קוראים לכם?"></div>
                    <div class="border-b py-4"><label class="text-[#D4AF37] text-xs font-bold uppercase">טלפון</label><input type="tel" id="phone" required class="w-full bg-transparent text-xl outline-none" placeholder="050-0000000"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                    <div class="border-b py-4">
                        <label class="text-[#D4AF37] text-xs font-bold uppercase">סוג אירוע</label>
                        <select id="eventType" class="w-full bg-transparent outline-none py-2 text-lg">
                            <option>חתונה</option><option>בר/בת מצווה</option><option>אירוע עסקי</option><option>אחר</option>
                        </select>
                    </div>
                    <div class="border-b py-4"><label class="text-[#D4AF37] text-xs font-bold uppercase">מוזמנים</label><input type="number" id="guests" class="w-full bg-transparent outline-none py-2 text-lg"></div>
                    <div class="border-b py-4">
                        <label class="text-[#D4AF37] text-xs font-bold uppercase">תאריך</label>
                        <div class="flex gap-1">
                            <select id="day" class="bg-transparent outline-none"></select>
                            <select id="month" class="bg-transparent outline-none"></select>
                            <select id="year" class="bg-transparent outline-none"></select>
                        </div>
                    </div>
                </div>
                <div class="border-b py-4"><label class="text-[#D4AF37] text-xs font-bold uppercase">הערות</label><textarea id="notes" class="w-full bg-transparent outline-none resize-none" rows="2"></textarea></div>
                <button type="submit" class="w-full py-6 bg-[#1A1A1A] text-white rounded-2xl text-xl font-black hover:bg-[#D4AF37] transition-all">שלחו הודעה בוואטסאפ</button>
            </form>
        </div>
    </section>

    <section id="reviews" class="py-24 px-6 max-w-4xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-5xl font-serif italic">לקוחות מספרים</h2>
        </div>

        <div id="auth-container" class="mb-12 text-center bg-white p-10 rounded-[40px] shadow-sm border border-gray-50">
            <button onclick="signInWithGoogle()" class="px-8 py-3 bg-[#1A1A1A] text-white rounded-full hover:bg-[#D4AF37] transition-all flex items-center gap-3 mx-auto">
                <i data-lucide="log-in"></i> התחברות עם Google להשארת תגובה
            </button>
        </div>

        <div id="comment-form-container" class="hidden mb-16 bg-white p-10 rounded-[40px] shadow-xl border border-gray-50">
            <form id="review-form" class="space-y-8">
                <input type="text" id="reviewer-name" readonly class="w-full border-b py-2 text-gray-400 outline-none">
                <textarea id="reviewer-text" required class="w-full border-b py-2 outline-none resize-none" placeholder="החוויה שלכם..."></textarea>
                <input type="hidden" id="user-email">
                <button type="submit" class="w-full py-5 bg-[#1A1A1A] text-white rounded-2xl font-black hover:bg-[#D4AF37] transition-all">פרסום תגובה</button>
            </form>
        </div>

        <div id="comments-list" class="grid gap-6"></div>
    </section>

    <footer class="py-16 text-center border-t">
        <h3 class="text-2xl font-black tracking-[0.5em] mb-4 uppercase">Snap Box</h3>
        <p class="text-[10px] text-gray-400">© 2026 כל הזכויות שמורות</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // חשיפת פונקציות ל-HTML
        window.toggleAccMenu = () => document.getElementById('accWrapper').classList.toggle('acc-menu-open');
        window.toggleLargeText = () => document.documentElement.classList.toggle('large-text-active');
        window.toggleContrast = () => document.body.classList.toggle('high-contrast-active');
        window.toggleHighlight = () => document.body.classList.toggle('highlight-active');
        
        window.signInWithGoogle = async () => {
            try { await signInWithPopup(auth, provider); } 
            catch (error) { console.error("Login failed", error); }
        };

        window.sendToWhatsapp = (e) => {
            e.preventDefault();
            const date = `${document.getElementById('day').value}/${document.getElementById('month').value}/${document.getElementById('year').value}`;
            const msg = `✨ *בקשה חדשה מ-SnapBox* ✨\n👤 שם: ${document.getElementById('name').value}\n🎉 אירוע: ${document.getElementById('eventType').value}\n📅 תאריך: ${date}`;
            window.open(`https://wa.me/972546056180?text=${encodeURIComponent(msg)}`, '_blank');
        };

        // ניהול תגובות
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('comment-form-container').classList.remove('hidden');
                document.getElementById('reviewer-name').value = user.displayName;
                document.getElementById('user-email').value = user.email;
            }
        });

        document.getElementById('review-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('reviewer-text').value;
            const user = auth.currentUser;
            if (user && text.trim()) {
                await addDoc(collection(db, "reviews"), {
                    name: user.displayName,
                    text: text,
                    photo: user.photoURL,
                    createdAt: serverTimestamp()
                });
                document.getElementById('reviewer-text').value = '';
                alert("תודה על התגובה!");
            }
        });

        const q = query(collection(db, "reviews"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('comments-list');
            if (!list) return;
            list.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = "bg-white p-8 rounded-[30px] border border-gray-100 shadow-sm animate-fade-in";
                div.innerHTML = `
                    <div class="flex items-center gap-4 mb-4" dir="rtl">
                        <img src="${data.photo || ''}" class="w-12 h-12 rounded-full border border-gray-50">
                        <div class="text-right">
                            <h4 class="font-bold text-[#1A1A1A]">${data.name}</h4>
                            <span class="text-[9px] text-[#D4AF37] font-bold uppercase tracking-widest">Verified Guest</span>
                        </div>
                    </div>
                    <p class="text-gray-600 italic text-right">"${data.text}"</p>
                `;
                list.appendChild(div);
            });
        });

        // אתחול טופס
        const daySel = document.getElementById('day'), monthSel = document.getElementById('month'), yearSel = document.getElementById('year');
        for(let i=1; i<=31; i++) daySel.options.add(new Option(i, i));
        for(let i=1; i<=12; i++) monthSel.options.add(new Option(i, i));
        const currYear = new Date().getFullYear();
        for(let i=currYear; i<=currYear+3; i++) yearSel.options.add(new Option(i, i));

        lucide.createIcons();
    </script>
</body>
</html>
