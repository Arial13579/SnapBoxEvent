<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Box | בוטיק עמדות צילום</title>
    
    <!-- לוגו בלשונית הדפדפן -->
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --base-font-size: 16px; }
        html { font-size: var(--base-font-size); transition: font-size 0.3s ease; }
        body { font-family: 'Assistant', sans-serif; overflow-x: hidden; scroll-behavior: smooth; background-color: #FCFBFA; color: #1A1A1A; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* גלריה אינסופית */
        .marquee-container { overflow: hidden; width: 100%; padding: 3rem 0; background: #fff; margin: 2rem 0; white-space: nowrap; }
        .marquee-content { display: inline-flex; gap: 2rem; width: max-content; animation: scroll-left 40s linear infinite; }
        .gallery-item { height: 400px; width: auto; border-radius: 24px; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* נגישות */
        .large-text-active { --base-font-size: 20px; }
        .high-contrast-active { background-color: #000 !important; color: #fff !important; }
        .high-contrast-active .bg-white, .high-contrast-active .form-container { background-color: #1a1a1a !important; color: #fff !important; }

        /* תפריט נגישות */
        .acc-option { position: absolute; transition: all 0.5s ease; opacity: 0; pointer-events: none; transform: scale(0); }
        .acc-menu-open .acc-option { opacity: 1; pointer-events: auto; transform: scale(1); }
        .acc-menu-open .opt-1 { transform: translate(0, 75px); }
        .acc-menu-open .opt-2 { transform: translate(65px, 45px); }
        .acc-menu-open .opt-3 { transform: translate(75px, -20px); }

        .whatsapp-float { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; border-radius: 50px; display: flex; align-items: center; justify-content: center; z-index: 400; transition: 0.4s; }
        .whatsapp-float:hover { transform: scale(1.1); background-color: #D4AF37 !important; }
    </style>
</head>
<body>

    <!-- WhatsApp Button -->
    <a href="https://wa.me/972546056180?text=היי%20רציתי%20לשמוע%20פרטים%20על%20SnapBox" 
       class="whatsapp-float shadow-2xl" 
       style="background-color: #1A1A1A !important; color: #FFFFFF !important;"
       target="_blank">
        <i data-lucide="message-circle"></i>
    </a>

    <!-- Accessibility -->
    <div id="accWrapper" class="fixed top-24 left-6 z-[300] flex flex-col items-center">
        <button onclick="toggleAccMenu()" id="accMainBtn" class="w-14 h-14 rounded-full bg-[#1A1A1A] text-white flex items-center justify-center border border-white/20">
            <i data-lucide="accessibility"></i>
        </button>
        <button onclick="toggleLargeText()" class="acc-option opt-1 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border"><b>A+</b></button>
        <button onclick="toggleContrast()" class="acc-option opt-2 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border"><i data-lucide="contrast" size="18"></i></button>
        <button onclick="toggleHighlight()" class="acc-option opt-3 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border"><i data-lucide="eye" size="18"></i></button>
    </div>

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-[150] px-4 py-6">
        <nav class="max-w-7xl mx-auto flex justify-between items-center p-4 px-10 rounded-full bg-white/80 backdrop-blur-md border border-gray-100 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="text-[#D4AF37]">
                    <svg viewBox="0 0 100 100" class="h-8 w-8" fill="none" stroke="currentColor"><path d="M50 45 L35 75 M50 45 L65 75" stroke-width="3"/><rect x="30" y="30" width="40" height="25" rx="2" stroke-width="3"/></svg>
                </div>
                <span class="font-black uppercase tracking-tighter">Snap Box</span>
            </div>
            <button onclick="document.getElementById('contact-form').scrollIntoView({behavior:'smooth'})" class="bg-[#1A1A1A] text-white rounded-full px-6 py-2 text-xs font-bold hover:bg-[#D4AF37] transition-all">הזמינו עכשיו</button>
        </nav>
    </header>

    <!-- Hero -->
    <section class="pt-64 pb-20 text-center px-6">
        <span class="text-[#D4AF37] font-bold uppercase tracking-[0.3em] text-xs">Premium Photo Booth</span>
        <h1 class="text-6xl md:text-8xl italic font-serif mt-4">היופי שברגע <br><span class="text-[#D4AF37] not-italic font-light">מעץ טבעי.</span></h1>
    </section>

    <!-- Marquee Gallery -->
    <div class="marquee-container">
        <div class="marquee-content">
            <img src="photo_5949512990937779361_y.jpg" class="gallery-item" alt="1">
            <video src="document_5990337496439856182.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5949512990937779362_y.jpg" class="gallery-item" alt="2">
            <video src="document_5990337496439856181.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5949512990937779363_y.jpg" class="gallery-item" alt="3">
            <img src="photo_5949512990937779361_y.jpg" class="gallery-item" alt="1">
            <video src="document_5990337496439856182.mp4" class="gallery-item" autoplay muted loop playsinline></video>
        </div>
    </div>

    <!-- Form Section -->
    <section id="contact-form" class="py-20 px-6 max-w-4xl mx-auto">
        <div class="form-container bg-white p-10 md:p-16 rounded-[40px] shadow-xl border border-gray-50">
            <h2 class="text-4xl font-serif italic text-center mb-12">דברו איתנו</h2>
            <form onsubmit="sendToWhatsapp(event)" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <input type="text" id="name" placeholder="שם מלא" required class="w-full border-b py-3 outline-none focus:border-[#D4AF37] transition-colors">
                    <input type="tel" id="phone" placeholder="טלפון" required class="w-full border-b py-3 outline-none focus:border-[#D4AF37] transition-colors text-left">
                </div>
                <select id="eventType" class="w-full border-b py-3 outline-none">
                    <option value="" disabled selected>סוג אירוע</option>
                    <option>חתונה</option>
                    <option>בר/בת מצווה</option>
                    <option>אירוע עסקי</option>
                    <option>אחר</option>
                </select>
                <!-- שדה מלל חופשי -->
<!-- שדה מלל חופשי חדש -->
<textarea id="freeText" placeholder="ספרו לנו קצת על האירוע שלכם (תאריך, מיקום, בקשות מיוחדות...)" rows="3" class="w-full border-b py-3 outline-none focus:border-[#D4AF37] transition-colors resize-none"></textarea>                
                <button type="submit" class="w-full py-5 bg-[#1A1A1A] text-white rounded-xl font-bold hover:bg-[#D4AF37] transition-all shadow-lg">שלחו הודעה לתיאום</button>
            </form>
        </div>
    </section>

    <!-- Footer עם רשתות חברתיות -->
    <footer class="py-16 text-center border-t border-gray-100">
        <div class="flex justify-center gap-8 mb-8">
            <a href="https://www.instagram.com/snapbox_event.official" target="_blank" class="text-gray-400 hover:text-[#D4AF37] transition-all transform hover:scale-125">
                <i data-lucide="instagram" size="32"></i>
            </a>
            <a href="https://www.facebook.com/share/18GcWQXLqA/" target="_blank" class="text-gray-400 hover:text-[#D4AF37] transition-all transform hover:scale-125">
                <i data-lucide="facebook" size="32"></i>
            </a>
        </div>
        <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">SNAP BOX STUDIO</p>
        <p class="text-[10px] text-gray-300 mt-2">© 2026 כל הזכויות שמורות</p>
    </footer>

    <script>
        lucide.createIcons();

        function toggleAccMenu() { document.getElementById('accWrapper').classList.toggle('acc-menu-open'); }
        function toggleLargeText() { document.documentElement.classList.toggle('large-text-active'); }
        function toggleContrast() { document.body.classList.toggle('high-contrast-active'); }
        function toggleHighlight() { document.body.classList.toggle('highlight-active'); }

        function sendToWhatsapp(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const event = document.getElementById('eventType').value;
            const freeText = document.getElementById('freeText').value;
            
            const msg = `✨ *פנייה חדשה מאתר SnapBox* ✨\n\n` +
                        `👤 *שם:* ${name}\n` +
                        `📞 *טלפון:* ${phone}\n` +
                        `🎉 *אירוע:* ${event || 'לא צוין'}\n` +
                        `📝 *הערות:* ${freeText || 'אין הערות נוספות'}`;
                        
            window.open(`https://wa.me/972546056180?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
