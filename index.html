<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Box | בוטיק עמדות צילום</title>
    
    <!-- Fonts & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Assistant', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Accessibility Overrides */
        .large-text-active { font-size: 1.25rem; }
        .large-text-active h1 { font-size: 4rem !important; }
        .large-text-active .nav-brand-text { font-size: 1.8rem !important; }
        
        .high-contrast-active { background: black !important; color: white !important; }
        .high-contrast-active .form-container { background: #1a1a1a !important; border-color: #333 !important; }
        .high-contrast-active input, .high-contrast-active select { color: white !important; }

        .highlight-active a, .highlight-active button { outline: 4px solid #D4AF37 !important; outline-offset: 4px !important; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 1.2s ease-out forwards; }
    </style>
</head>
<body class="bg-[#FCFBFA] text-[#1A1A1A] transition-all duration-500">

    <!-- Accessibility Menu -->
    <div class="fixed top-24 left-6 z-[300] flex flex-col items-center">
        <button onclick="toggleAccMenu()" id="accMainBtn" class="w-14 h-14 rounded-full shadow-2xl bg-[#1A1A1A] text-white flex items-center justify-center transition-all duration-500 border border-white/20">
            <i data-lucide="accessibility"></i>
        </button>
        <div id="accOptions" class="hidden flex flex-col gap-4 mt-4">
            <button onclick="toggleLargeText()" class="bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border hover:bg-[#D4AF37] hover:text-white"><b>A+</b></button>
            <button onclick="toggleContrast()" class="bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border hover:bg-[#D4AF37] hover:text-white"><i data-lucide="contrast" size="20"></i></button>
        </div>
    </div>

    <!-- Floating WhatsApp -->
    <a href="https://wa.me/972546056180" target="_blank" class="fixed bottom-8 left-8 z-[100] w-16 h-16 rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition-all border-2 border-white bg-[#1A1A1A]">
        <i data-lucide="message-circle" color="white" size="30"></i>
    </a>

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-[150] px-4 py-6 md:px-12">
        <nav class="max-w-7xl mx-auto flex justify-between items-center p-4 px-10 rounded-full bg-white/70 backdrop-blur-xl border border-gray-100 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="text-[#D4AF37]">
                    <svg viewBox="0 0 100 100" class="h-10 w-10" fill="none" stroke="currentColor">
                        <path d="M50 45 L35 75 M50 45 L65 75 M42 75 L58 75" stroke-width="2.5" stroke-linecap="round"/>
                        <rect x="32" y="30" width="36" height="22" rx="3" stroke-width="2.5"/>
                        <circle cx="50" cy="41" r="6" stroke-width="2.5"/>
                    </svg>
                </div>
                <div class="flex flex-col">
                    <span class="nav-brand-text font-black uppercase text-2xl leading-none">Snap Box</span>
                    <span class="text-[10px] font-bold tracking-[0.2em] uppercase mt-1 text-gray-500">פשוט רגעים יפים מעץ טבעי</span>
                </div>
            </div>
            <button onclick="document.getElementById('contact-form').scrollIntoView({behavior:'smooth'})" class="bg-[#1A1A1A] text-white rounded-full font-black px-8 py-3 text-[11px] hover:bg-[#D4AF37] transition-all">
                שריינו תאריך
            </button>
        </nav>
    </header>

    <!-- Hero -->
    <section class="relative pt-64 pb-16 px-6 max-w-7xl mx-auto text-center animate-fade-in">
        <div class="mb-12 inline-flex items-center gap-6">
            <div class="h-[1px] w-16 bg-[#D4AF37]"></div>
            <span class="font-bold uppercase tracking-[0.4em] text-sm text-[#D4AF37]">בוטיק עמדות צילום</span>
            <div class="h-[1px] w-16 bg-[#D4AF37]"></div>
        </div>
        
        <h1 class="hero-title leading-[1.1] mb-14 tracking-tighter text-6xl md:text-8xl font-serif italic">
            היופי שברגע <br />
            <span class="font-light not-italic text-[#D4AF37]">מעץ טבעי.</span>
        </h1>

        <p class="max-w-2xl mx-auto text-xl md:text-2xl font-medium text-gray-500 leading-relaxed">
            עמדת צילום בוטיק בעבודת יד. <br />
            שילוב מושלם של חמימות אורגנית וטכנולוגיה עילית.
        </p>
    </section>

    <!-- Form Section -->
    <section id="contact-form" class="py-20 px-6 max-w-6xl mx-auto">
        <div class="form-container bg-white p-8 md:p-24 rounded-[100px] shadow-2xl border border-gray-100/50 transition-all">
            <div class="text-center mb-16">
                <h2 class="text-6xl font-serif italic mb-6">שריינו מקום</h2>
                <div class="mx-auto w-24 h-[1px] bg-[#D4AF37] mb-6"></div>
            </div>

            <form onsubmit="sendToWhatsapp(event)" class="space-y-12">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="border-b border-gray-200 py-4">
                        <label class="text-[#D4AF37] text-xs font-bold uppercase tracking-widest">שם מלא</label>
                        <input type="text" id="name" required class="w-full bg-transparent text-2xl outline-none py-2" placeholder="איך קוראים לכם?">
                    </div>
                    <div class="border-b border-gray-200 py-4 text-left">
                        <label class="text-[#D4AF37] text-xs font-bold uppercase tracking-widest block text-right">טלפון</label>
                        <input type="tel" id="phone" required class="w-full bg-transparent text-2xl outline-none py-2 text-left" placeholder="050-0000000">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                    <div class="border-b border-gray-200">
                        <label class="text-[#D4AF37] text-xs font-bold uppercase tracking-widest">סוג אירוע</label>
                        <select id="eventType" class="w-full bg-transparent py-4 outline-none">
                            <option>חתונה</option>
                            <option>בר/בת מצווה</option>
                            <option>אירוע עסקי</option>
                        </select>
                    </div>
                    <div class="border-b border-gray-200">
                        <label class="text-[#D4AF37] text-xs font-bold uppercase tracking-widest">עיר</label>
                        <input type="text" id="city" class="w-full bg-transparent py-4 outline-none" placeholder="איפה האירוע?">
                    </div>
                    <div class="border-b border-gray-200">
                        <label class="text-[#D4AF37] text-xs font-bold uppercase tracking-widest">תאריך</label>
                        <input type="date" id="eventDate" class="w-full bg-transparent py-4 outline-none">
                    </div>
                </div>

                <button type="submit" class="w-full py-8 bg-[#1A1A1A] text-white rounded-3xl text-xl font-black uppercase tracking-widest hover:bg-[#D4AF37] shadow-xl transition-all">
                    שליחה ותיאום בוואטסאפ
                </button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-24 text-center border-t border-gray-100 bg-white">
        <h3 class="text-3xl font-black tracking-[0.8em] mb-4">SNAP BOX</h3>
        <p class="text-xs text-gray-400">© 2026 כל הזכויות שמורות ל-SNAP BOX EVENT</p>
    </footer>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Accessibility Functions
        function toggleAccMenu() {
            const menu = document.getElementById('accOptions');
            menu.classList.toggle('hidden');
        }

        function toggleLargeText() {
            document.body.classList.toggle('large-text-active');
        }

        function toggleContrast() {
            document.body.classList.toggle('high-contrast-active');
        }

        // Form Logic
        function sendToWhatsapp(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const eventType = document.getElementById('eventType').value;
            const city = document.getElementById('city').value;
            const date = document.getElementById('eventDate').value;

            const message = `שלום, אשמח לפרטים על עמדת צילום:\nשם: ${name}\nטלפון: ${phone}\nסוג אירוע: ${eventType}\nמיקום: ${city}\nתאריך: ${date}`;
            
            const whatsappUrl = `https://wa.me/972546056180?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
