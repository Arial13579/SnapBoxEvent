<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Box | ביקורות מהשטח</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #000000;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: #0a0a0a;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* קונטיינר ראשי */
        .sb-reviews-wrapper {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* כותרת */
        .sb-title {
            font-size: 2rem;
            font-weight: 200;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* סליידר תגובות */
        .sb-slider-container {
            height: 150px;
            overflow: hidden;
            margin-bottom: 40px;
            position: relative;
        }

        .sb-rev-track {
            display: flex;
            transition: transform 0.8s cubic-bezier(0.45, 0, 0.55, 1);
            height: 100%;
        }

        .sb-rev-card {
            min-width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10px;
        }

        .sb-rev-card .content {
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .sb-rev-card .author {
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* עיצוב הטופס החדש */
        .sb-input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .sb-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px 20px;
            color: white;
            outline: none;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .sb-input:focus {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        textarea.sb-input {
            height: 100px;
            resize: none;
        }

        /* כפתור שליחה "מגניב בעולם" */
        .sb-submit-btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: white;
            color: black;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .sb-submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
            letter-spacing: 4px;
        }

        .sb-submit-btn:active {
            transform: translateY(0);
        }

        .sb-submit-btn:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
        }

        /* הודעת הצלחה */
        #sb-rev-success {
            display: none;
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            color: #4ade80;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* נקודת מנהל נסתרת */
        .sb-admin-trigger {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 5px;
            height: 5px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sb-reviews-wrapper">
        <h2 class="sb-title">What They Say</h2>

        <div class="sb-slider-container">
            <div id="sb-rev-track" class="sb-rev-track">
                </div>
        </div>

        <form id="sb-rev-form">
            <div class="sb-input-group">
                <input type="text" id="sb-rev-name" class="sb-input" placeholder="שם מלא" required>
            </div>
            <div class="sb-input-group">
                <input type="email" id="sb-rev-email" class="sb-input" placeholder="אימייל" required>
            </div>
            <div class="sb-input-group">
                <textarea id="sb-rev-text" class="sb-input" placeholder="איך הייתה החוויה שלכם?" required></textarea>
            </div>
            <button type="submit" id="sb-rev-submit" class="sb-submit-btn">שלח ביקורת</button>
        </form>

        <div id="sb-rev-success">תודה! הביקורת שלך עלתה לאוויר ✨</div>
        
        <div id="sb-rev-admin-trigger" class="sb-admin-trigger"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTR6_WpHJv9bw7UtIF4yRpHcGydYFj9pk",
            authDomain: "snapbox-reviews.firebaseapp.com",
            projectId: "snapbox-reviews",
            storageBucket: "snapbox-reviews.firebasestorage.app",
            messagingSenderId: "665556822467",
            appId: "1:665556822467:web:8bfbff09c668c77c76f576"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        (function() {
            const ADMIN_PW = "1234";
            const FORMSPREE_URL = "https://formspree.io/f/mpwrobzk";
            
            const track = document.getElementById('sb-rev-track');
            const form = document.getElementById('sb-rev-form');
            const successMsg = document.getElementById('sb-rev-success');
            const btn = document.getElementById('sb-rev-submit');
            const adminDot = document.getElementById('sb-rev-admin-trigger');

            let reviewsData = [];
            let currentIndex = 0;
            let isAdmin = false;
            let submittedEmails = JSON.parse(localStorage.getItem('sb_voted_emails')) || [];

            // טעינת ביקורות בזמן אמת מהענן
            const q = query(collection(db, "reviews"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                reviewsData = [];
                snapshot.forEach((doc) => {
                    reviewsData.push({ id: doc.id, ...doc.data() });
                });
                render();
            });

            function render() {
                if (!track) return;
                if (reviewsData.length === 0) {
                    track.innerHTML = '<div class="sb-rev-card"><p class="content">עוד אין ביקורות, מוזמנים לכתוב!</p></div>';
                    return;
                }
                track.innerHTML = reviewsData.map((rev) => `
                    <div class="sb-rev-card">
                        <p class="content">"${rev.text}"</p>
                        <span class="author">— ${rev.name}</span>
                        ${isAdmin ? `<button onclick="deleteReview('${rev.id}')" style="color:#ff4444; margin-top:10px; font-size:0.7rem; text-decoration:underline; cursor:pointer; background:none; border:none;">מחק תגובה</button>` : ''}
                    </div>
                `).join('');
            }

            // סליידר אוטומטי
            setInterval(() => {
                if (reviewsData.length <= 1) return;
                currentIndex = (currentIndex + 1) % reviewsData.length;
                track.style.transform = `translateX(${currentIndex * 100}%)`;
            }, 4000);

            // שליחת טופס
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('sb-rev-name').value;
                const email = document.getElementById('sb-rev-email').value;
                const text = document.getElementById('sb-rev-text').value;

                if (submittedEmails.includes(email.toLowerCase())) {
                    alert("כבר שלחת ביקורת בעבר");
                    return;
                }

                btn.disabled = true;
                btn.innerText = "שולח...";

                try {
                    await addDoc(collection(db, "reviews"), {
                        name, email, text, createdAt: serverTimestamp()
                    });

                    fetch(FORMSPREE_URL, {
                        method: 'POST',
                        body: new FormData(form),
                        headers: { 'Accept': 'application/json' }
                    });

                    submittedEmails.push(email.toLowerCase());
                    localStorage.setItem('sb_voted_emails', JSON.stringify(submittedEmails));

                    form.style.display = 'none';
                    successMsg.style.display = 'block';
                } catch (err) {
                    alert("שגיאה בחיבור לענן");
                    btn.disabled = false;
                    btn.innerText = "נסה שוב";
                }
            });

            window.deleteReview = async (id) => {
                if (confirm("למחוק לצמיתות?")) {
                    await deleteDoc(doc(db, "reviews", id));
                }
            };

            adminDot.addEventListener('click', () => {
                if (prompt("סיסמת מנהל:") === ADMIN_PW) {
                    isAdmin = true;
                    render();
                    alert("מצב מנהל פעיל");
                }
            });
        })();
    </script>
</body>
</html>
