    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --base-font-size: 16px; }
        html { font-size: var(--base-font-size); transition: font-size 0.3s ease; }
        body { font-family: 'Assistant', sans-serif; overflow-x: hidden; scroll-behavior: smooth; background-color: #FCFBFA; color: #1A1A1A; transition: background 0.3s, color 0.3s; }
        .font-serif { font-family: 'Playfair Display', serif; }

       /* תיקון האנימציה ללופ מושלם */
.marquee-content { 
    display: inline-flex; 
    gap: 2rem;
    width: max-content; 
    animation: scroll-left 40s linear infinite; 
}

@keyframes scroll-left {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); } /* חייב להיות 50% בגלל השכפול */
}

/* מניעת עצירה או קפיצות במובייל */
.gallery-item {
    will-change: transform;
}
        .marquee-container {
    position: relative;
    mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
}
        .gallery-item {
    height: 450px; /* הגדלנו מעט לנוכחות */
    width: 320px;
    object-fit: cover;
    border-radius: 24px; /* רדיוס עגול ויוקרתי יותר */
    box-shadow: 0 20px 40px rgba(0,0,0,0.08); /* צל רך מאוד */
    transition: transform 0.5s cubic-bezier(0.2, 0, 0.2, 1);
    background: #eee; /* צבע רקע בזמן טעינה */
}

/* אפקט קטן במעבר עכבר */
.gallery-item:hover {
    transform: scale(1.02);
}@media (max-width: 768px) {
    .gallery-item {
        height: 350px;
        width: 250px;
    }
    .marquee-content {
        gap: 1rem; /* רווח קטן יותר במובייל */
    }
}
        /* נגישות */
        .large-text-active { --base-font-size: 20px; }
        .high-contrast-active { background-color: #000 !important; color: #fff !important; }
        .high-contrast-active .bg-white, .high-contrast-active .form-container, .high-contrast-active .marquee-container { background-color: #1a1a1a !important; color: #fff !important; border-color: #fff !important; }
        .high-contrast-active .text-gray-400, .high-contrast-active .text-gray-500 { color: #ccc !important; }
        .highlight-active a, .highlight-active button:not(#accMainBtn) { outline: 3px solid #D4AF37 !important; outline-offset: 4px !important; }

        /* תפריט נגישות */
        .acc-menu-open #accMainBtn { transform: rotate(180deg); }
        .acc-option { position: absolute; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); opacity: 0; pointer-events: none; transform: scale(0); }
        .acc-menu-open .acc-option { opacity: 1; pointer-events: auto; transform: scale(1); }
        .acc-menu-open .opt-1 { transform: translate(0, 75px); }
        .acc-menu-open .opt-2 { transform: translate(65px, 45px); }
        .acc-menu-open .opt-3 { transform: translate(75px, -20px); }

        @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 1.2s ease-out forwards; }

        .whatsapp-float { 
            position: fixed; 
            bottom: 30px; 
            left: 30px; 
            width: 60px; 
            height: 60px; 
            border-radius: 50px; 
            text-align: center; 
            font-size: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            z-index: 400; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid rgba(255,255,255,0.1);
        }

        .whatsapp-float:hover { 
            transform: scale(1.1) rotate(5deg); 
            background-color: #D4AF37 !important; 
        }

            e.preventDefault();
            const dateStr = `${daySel.value}/${monthSel.value}/${yearSel.value}`;

    <script>
     // אתחול אייקונים רק אחרי שהדף נטען במלואו
    window.addEventListener('load', function() {
        lucide.createIcons();
    });

    // מילוי תאריכים
    const daySel = document.getElementById('day'), 
          monthSel = document.getElementById('month'), 
          yearSel = document.getElementById('year');
    
    if(daySel) { // בדיקת בטיחות שהאלמנט קיים
        for(let i=1; i<=31; i++) daySel.options.add(new Option(i, i));
        for(let i=1; i<=12; i++) monthSel.options.add(new Option(i, i));
        const currYear = new Date().getFullYear();
        for(let i=currYear; i<=currYear+3; i++) yearSel.options.add(new Option(i, i));
    }

    // נגישות
    function toggleAccMenu() { document.getElementById('accWrapper').classList.toggle('acc-menu-open'); }
    function toggleLargeText() { document.documentElement.classList.toggle('large-text-active'); }
    function toggleContrast() { document.body.classList.toggle('high-contrast-active'); }
    function toggleHighlight() { document.body.classList.toggle('highlight-active'); }

    function sendToWhatsapp(e) {
        e.preventDefault();
        const dateStr = `${daySel.value}/${monthSel.value}/${yearSel.value}`;
        const msg = `✨ *בקשה לסנאפבוקס* ✨\n\n` +
                    `👤 *שם:* ${document.getElementById('name').value}\n` +
                    `🎉 *אירוע:* ${document.getElementById('eventType').value}\n` +
                    `👥 *מוזמנים:* ${document.getElementById('guests').value}\n` +
                    `📅 *תאריך:* ${dateStr}\n` +
                    `📝 *הערות:* ${document.getElementById('notes').value || 'אין'}`;
        window.open(`https://wa.me/972546056180?text=${encodeURIComponent(msg)}`, '_blank');
    }
    </script>
