<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Box | בוטיק עמדות צילום</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">

    <style>
        :root { --base-font-size: 16px; }
        html { font-size: var(--base-font-size); transition: font-size 0.3s ease; scroll-behavior: smooth; }
        body { font-family: 'Assistant', sans-serif; background-color: #FCFBFA; color: #1A1A1A; margin: 0; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* נגישות */
        #accWrapper { position: fixed; top: 100px; left: 24px; z-index: 9999; }
        .acc-option { 
            position: absolute; top: 0; left: 0; 
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            opacity: 0; pointer-events: none; transform: scale(0);
            background: white; width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #eee;
        }
        .acc-menu-open .acc-option { opacity: 1; pointer-events: auto; transform: scale(1); }
        .acc-menu-open .opt-1 { transform: translate(5px, 65px); }
        .acc-menu-open .opt-2 { transform: translate(60px, 40px); }
        .acc-menu-open .opt-3 { transform: translate(70px, -15px); }
        
        .large-text-active { --base-font-size: 20px; }
        .high-contrast-active { background-color: #000 !important; color: #fff !important; }
        .high-contrast-active .bg-white, .high-contrast-active nav { background-color: #1a1a1a !important; color: #fff !important; border-color: #444 !important; }
        .highlight-active a, .highlight-active button:not(#accMainBtn) { outline: 3px solid #D4AF37 !important; outline-offset: 3px; }

        /* גלריה זזה - 15 שניות */
        .marquee-container { overflow: hidden; white-space: nowrap; padding: 3rem 0; background: #fff; margin: 2rem 0; }
        .marquee-content { display: inline-flex; animation: scroll-left 15s linear infinite; gap: 2rem; }
        @keyframes scroll-left {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        .gallery-item { width: 350px; height: 450px; border-radius: 24px; object-fit: cover; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }

        /* וואטסאפ צף */
        .whatsapp-float { 
            position: fixed; bottom: 30px; left: 30px; 
            width: 60px; height: 60px; border-radius: 50%;
            background: #1A1A1A; color: white;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .whatsapp-float:hover { background: #D4AF37; transform: scale(1.1); }

        /* עיצוב כותרת Hero */
        .gold-line { height: 1px; width: 45px; background: linear-gradient(90deg, transparent, #D4AF37, transparent); }
    </style>
</head>
<body>

    <!-- כפתור וואטסאפ -->
    <a href="https://wa.me/972546056180?text=היי%20אשמח%20לשמוע%20פרטים" class="whatsapp-float" target="_blank">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/></svg>
    </a>

    <!-- תפריט נגישות -->
    <div id="accWrapper">
        <button onclick="toggleAccMenu()" id="accMainBtn" class="w-14 h-14 rounded-full bg-[#1A1A1A] text-white flex items-center justify-center transition-all duration-500 shadow-xl">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="4" r="1"/><path d="m18 19 1-7-6 1"/><path d="m5 8 3-3 5.5 3-2.36 3.5"/><path d="M4.24 14.5a5 5 0 0 0 6.88 6"/><path d="M13.76 17.5a5 5 0 0 0-6.88-6"/></svg>
        </button>
        <button onclick="toggleLargeText()" title="הגדלת טקסט" class="acc-option opt-1 font-bold">A+</button>
        <button onclick="toggleContrast()" title="ניגודיות" class="acc-option opt-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 18a6 6 0 0 0 0-12v12z"/></svg>
        </button>
        <button onclick="toggleHighlight()" title="הדגשה" class="acc-option opt-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </div>

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-[150] p-6">
        <nav class="max-w-7xl mx-auto flex justify-between items-center p-4 px-10 rounded-full bg-white/80 backdrop-blur-md shadow-sm border border-gray-100">
            <div class="flex flex-col">
                <span class="font-black text-xl tracking-tight">SNAP BOX</span>
                <span class="text-[9px] font-bold tracking-[0.2em] text-gray-500 uppercase">עמדות צילום בוטיק</span>
            </div>
            <button onclick="document.getElementById('contact-form').scrollIntoView({behavior:'smooth'})" class="bg-[#1A1A1A] text-white rounded-full font-bold px-6 py-2 text-xs hover:bg-[#D4AF37] transition-colors">דברו איתנו</button>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="pt-48 pb-12 text-center px-6">
        <div class="flex items-center justify-center gap-4 mb-6">
            <div class="gold-line"></div>
            <span class="text-[#D4AF37] font-bold tracking-[0.4em] text-xs uppercase">Premium Experience</span>
            <div class="gold-line"></div>
        </div>
        <h1 class="text-6xl md:text-8xl font-serif italic mb-8">היופי שברגע <br><span class="text-[#D4AF37] not-italic font-light">מעץ טבעי.</span></h1>
    </section>

    <!-- Marquee Gallery -->
    <div class="marquee-container">
        <div class="marquee-content">
            <img src="photo_5949512990937779361_y.jpg" class="gallery-item" alt="1">
            <video src="document_5990337496439856182.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5949512990937779362_y.jpg" class="gallery-item" alt="2">
            <video src="document_5990337496439856181.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5949512990937779363_y.jpg" class="gallery-item" alt="3">
            <img src="photo_5990337496899849480_y.jpg" class="gallery-item" alt="4">
            <!-- העתקה לצורך לופ חלק -->
            <img src="photo_5949512990937779361_y.jpg" class="gallery-item" alt="1">
            <video src="document_5990337496439856182.mp4" class="gallery-item" autoplay muted loop playsinline></video>
        </div>
    </div>

    <!-- Contact Form -->
    <section id="contact-form" class="py-24 px-6 max-w-4xl mx-auto">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl border border-gray-50">
            <h2 class="text-4xl font-serif italic text-center mb-12">בואו נתחיל לתכנן</h2>
            <form onsubmit="sendToWhatsapp(event)" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="border-b border-gray-200 py-2">
                        <label class="text-[#D4AF37] text-[10px] font-bold uppercase block mb-1">שם מלא</label>
                        <input type="text" id="name" required class="w-full bg-transparent text-lg outline-none" placeholder="השם שלכם">
                    </div>
                    <div class="border-b border-gray-200 py-2">
                        <label class="text-[#D4AF37] text-[10px] font-bold uppercase block mb-1">טלפון</label>
                        <input type="tel" id="phone" required class="w-full bg-transparent text-lg outline-none text-left" placeholder="050-0000000">
                    </div>
                </div>
                <div class="border-b border-gray-200 py-2">
                    <label class="text-[#D4AF37] text-[10px] font-bold uppercase block mb-1">סוג אירוע</label>
                    <select id="eventType" class="w-full bg-transparent text-lg outline-none py-2">
                        <option>חתונה</option>
                        <option>בר/בת מצווה</option>
                        <option>אירוע חברה</option>
                        <option>אחר</option>
                    </select>
                </div>
                <button type="submit" class="w-full py-6 bg-[#1A1A1A] text-white rounded-2xl font-bold text-xl hover:bg-[#D4AF37] transition-all transform hover:-translate-y-1 shadow-lg">
                    שליחת הודעה לוואטסאפ
                </button>
            </form>
        </div>
    </section>

    <!-- Footer & Social -->
    <footer class="py-20 text-center border-t border-gray-100">
        <div class="flex justify-center gap-8 mb-10">
            <a href="https://www.instagram.com/snapbox_event.official" target="_blank" class="text-gray-400 hover:text-[#D4AF37] transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
            </a>
            <a href="https://www.facebook.com/share/18GcWQXLqA" target="_blank" class="text-gray-400 hover:text-[#D4AF37] transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
            </a>
        </div>
        <p class="text-xs text-gray-400 font-bold tracking-widest uppercase">© 2026 Snap Box Event - All Rights Reserved</p>
    </footer>

    <script>
        function toggleAccMenu() {
            const wrapper = document.getElementById('accWrapper');
            wrapper.classList.toggle('acc-menu-open');
        }

        function toggleLargeText() { document.documentElement.classList.toggle('large-text-active'); }
        function toggleContrast() { document.body.classList.toggle('high-contrast-active'); }
        function toggleHighlight() { document.body.classList.toggle('highlight-active'); }

        function sendToWhatsapp(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const type = document.getElementById('eventType').value;
            const msg = `היי, אני ${name} (${phone}), אשמח לקבל הצעה לאירוע ${type} בסנאפבוקס!`;
            window.open(`https://wa.me/972546056180?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
