<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Snap Box - בוטיק עמדות צילום פרימיום מעץ טבעי">
    <title>Snap Box | בוטיק עמדות צילום</title>
    
    <!-- לוגו בלשונית הדפדפן -->
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <!-- ספריות וגופנים חיצוניים -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --base-font-size: 16px; }
        html { font-size: var(--base-font-size); transition: font-size 0.3s ease; }
        body { font-family: 'Assistant', sans-serif; overflow-x: hidden; scroll-behavior: smooth; background-color: #FCFBFA; color: #1A1A1A; transition: background 0.3s, color 0.3s; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* גלריה אינסופית (Marquee) */
        .marquee-container { 
            overflow: hidden; 
            width: 100%;
            padding: 3rem 0; 
            background: #fff; 
            margin: 2rem 0;
            white-space: nowrap;
        }

        .marquee-content { 
            display: inline-flex; 
            gap: 2rem;
            width: max-content;
            animation: scroll-left 40s linear infinite; 
        }

        .gallery-item {
            height: 350px;
            width: auto;
            border-radius: 24px;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* מערכת נגישות */
        .large-text-active { --base-font-size: 20px; }
        .high-contrast-active { background-color: #000 !important; color: #fff !important; }
        .high-contrast-active .bg-white, .high-contrast-active .form-container, .high-contrast-active .marquee-container { 
            background-color: #1a1a1a !important; color: #fff !important; border-color: #fff !important; 
        }
        .highlight-active a, .highlight-active button:not(#accMainBtn) { 
            outline: 3px solid #D4AF37 !important; outline-offset: 4px !important; 
        }

        .acc-option { position: absolute; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); opacity: 0; pointer-events: none; transform: scale(0); }
        .acc-menu-open .acc-option { opacity: 1; pointer-events: auto; transform: scale(1); }
        .acc-menu-open .opt-1 { transform: translate(0, 75px); }
        .acc-menu-open .opt-2 { transform: translate(65px, 45px); }
        .acc-menu-open .opt-3 { transform: translate(75px, -20px); }

        /* כפתור וואטסאפ צף */
        .whatsapp-float { 
            position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; 
            border-radius: 50px; z-index: 400; display: flex; align-items: center; 
            justify-content: center; transition: all 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        .whatsapp-float:hover { transform: scale(1.1) rotate(5deg); background-color: #D4AF37 !important; }

        @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 1.2s ease-out forwards; }
    </style>
</head>
<body>

    <!-- כפתור וואטסאפ צף -->
    <a href="https://wa.me/972546056180?text=היי%20רציתי%20לשמוע%20פרטים%20על%20עמדות%20הצילום%20שלכם" 
       class="whatsapp-float" 
       style="background-color: #1A1A1A !important; color: #FFFFFF !important;"
       target="_blank" rel="noopener">
        <i data-lucide="message-circle" style="width: 32px; height: 32px;"></i>
    </a>

    <!-- תפריט נגישות -->
    <div id="accWrapper" class="fixed top-24 left-6 z-[300] flex flex-col items-center">
        <button onclick="toggleAccMenu()" id="accMainBtn" class="w-14 h-14 rounded-full shadow-2xl bg-[#1A1A1A] text-white flex items-center justify-center transition-all duration-500 border border-white/20">
            <i data-lucide="accessibility"></i>
        </button>
        <button onclick="toggleLargeText()" title="הגדלת טקסט" class="acc-option opt-1 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border border-gray-100 hover:bg-[#D4AF37] hover:text-white"><b>A+</b></button>
        <button onclick="toggleContrast()" title="ניגודיות גבוהה" class="acc-option opt-2 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border border-gray-100 hover:bg-[#D4AF37] hover:text-white"><i data-lucide="contrast" size="18"></i></button>
        <button onclick="toggleHighlight()" title="הדגשת קישורים" class="acc-option opt-3 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border border-gray-100 hover:bg-[#D4AF37] hover:text-white"><i data-lucide="eye" size="18"></i></button>
    </div>

    <!-- 1. Header & Navigation -->
    <header class="fixed top-0 left-0 right-0 z-[150] px-4 py-6 md:px-12">
        <nav class="max-w-7xl mx-auto flex justify-between items-center p-4 px-10 rounded-full bg-white/70 backdrop-blur-xl border border-gray-100 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="text-[#D4AF37]">
                    <svg viewBox="0 0 100 100" class="h-10 w-10" fill="none" stroke="currentColor"><path d="M50 45 L35 75 M50 45 L65 75" stroke-width="2.5" stroke-linecap="round"/><rect x="32" y="30" width="36" height="22" rx="3" stroke-width="2.5"/><circle cx="50" cy="41" r="6" stroke-width="2.5"/></svg>
                </div>
                <div class="flex flex-col">
                    <span class="font-black uppercase leading-none">Snap Box</span>
                    <span class="text-[10px] font-bold tracking-[0.2em] uppercase mt-1 text-gray-500">פשוט רגעים יפים מעץ טבעי</span>
                </div>
            </div>
            <button onclick="document.getElementById('contact-form').scrollIntoView({behavior:'smooth'})" class="bg-[#1A1A1A] text-white rounded-full font-black px-6 py-2 text-[11px] hover:bg-[#D4AF37] transition-all">שריינו תאריך</button>
        </nav>
    </header>

    <!-- 2. Hero Section -->
    <section class="relative pt-64 pb-20 px-6 max-w-7xl mx-auto text-center animate-fade-in">
        <span class="font-bold uppercase tracking-[0.4em] text-sm text-[#D4AF37]">בוטיק עמדות צילום</span>
        <h1 class="text-6xl md:text-8xl italic font-serif leading-[1.1] mt-6">היופי שברגע <br /><span class="text-[#D4AF37] not-italic font-light">מעץ טבעי.</span></h1>
    </section>

    <!-- 3. Marquee Gallery -->
    <div class="marquee-container">
        <div class="marquee-content">
            <!-- מדיה - וודא שהקבצים קיימים בתיקייה ב-GitHub -->
            <img src="photo_5949512990937779361_y.jpg" class="gallery-item" alt="SnapBox 1">
            <video src="document_5990337496439856182.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5949512990937779362_y.jpg" class="gallery-item" alt="SnapBox 2">
            <video src="document_5990337496439856181.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5949512990937779363_y.jpg" class="gallery-item" alt="SnapBox 3">
            <img src="photo_5990337496899849480_y.jpg" class="gallery-item" alt="SnapBox 4">
            <!-- שכפול ללופ חלק -->
            <img src="photo_5949512990937779361_y.jpg" class="gallery-item" alt="SnapBox 1">
            <video src="document_5990337496439856182.mp4" class="gallery-item" autoplay muted loop playsinline></video>
        </div>
    </div>

    <!-- 5. Booking Form Section -->
    <section id="contact-form" class="py-20 px-6 max-w-6xl mx-auto">
        <div class="form-container bg-white p-8 md:p-20 rounded-[60px] shadow-2xl border border-gray-100/50">
            <h2 class="text-4xl md:text-6xl font-serif italic text-center mb-16">שריינו מקום</h2>
            <form onsubmit="sendToWhatsapp(event)" class="space-y-12">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="border-b py-4"><label class="text-[#D4AF37] text-xs font-bold uppercase">שם מלא</label><input type="text" id="name" required class="w-full bg-transparent text-xl outline-none" placeholder="איך קוראים לכם?"></div>
                    <div class="border-b py-4"><label class="text-[#D4AF37] text-xs font-bold uppercase block text-right">טלפון</label><input type="tel" id="phone" required class="w-full bg-transparent text-xl outline-none text-left" placeholder="050-0000000"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                    <div class="border-b"><label class="text-[#D4AF37] text-xs font-bold uppercase">סוג אירוע</label>
                        <select id="eventType" required class="w-full bg-transparent py-4 outline-none text-lg">
                            <option value="" disabled selected>בחר סוג אירוע</option>
                            <option>חתונה</option><option>בר/בת מצווה</option><option>יום הולדת</option><option>אירוע עסקי</option><option>אחר</option>
                        </select>
                    </div>
                    <div class="border-b"><label class="text-[#D4AF37] text-xs font-bold uppercase">מספר מוזמנים</label><input type="number" id="guests" class="w-full bg-transparent py-4 outline-none text-lg" placeholder="כמות משוערת"></div>
                    <div class="border-b"><label class="text-[#D4AF37] text-xs font-bold uppercase">תאריך האירוע</label>
                        <div class="flex gap-2"><select id="day" class="bg-transparent py-4 outline-none w-1/3 text-base"></select><select id="month" class="bg-transparent py-4 outline-none w-1/3 text-base"></select><select id="year" class="bg-transparent py-4 outline-none w-1/3 text-base"></select></div>
                    </div>
                </div>

                <div class="border-b py-4"><label class="text-[#D4AF37] text-xs font-bold uppercase">הערות נוספות</label><textarea id="notes" rows="2" class="w-full bg-transparent text-lg outline-none resize-none" placeholder="ספרו לנו עוד..."></textarea></div>
                <button type="submit" class="w-full py-6 bg-[#1A1A1A] text-white rounded-2xl text-xl font-black hover:bg-[#D4AF37] transition-all shadow-xl">שלחו הודעה בוואטסאפ</button>
            </form>
        </div>
    </section>

    <!-- 7. Footer -->
    <footer class="py-16 text-center border-t">
        <div class="flex justify-center gap-12 mb-10">
            <a href="https://www.instagram.com/snapbox_event.official" target="_blank" class="social-link transition-transform hover:scale-125"><i data-lucide="instagram" style="width: 32px; height: 32px;"></i></a>
            <a href="https://www.facebook.com/share/18GcWQXLqA/" target="_blank" class="social-link transition-transform hover:scale-125"><i data-lucide="facebook" style="width: 32px; height: 32px;"></i></a>
        </div>
        <h3 class="text-2xl font-black tracking-[0.5em] mb-4 uppercase">SNAP BOX</h3>
        <p class="text-[10px] text-gray-400 uppercase">© 2026 כל הזכויות שמורות</p>
    </footer>

    <script>
        // אתחול אייקונים של Lucide
        lucide.createIcons();

        // מילוי אוטומטי של תאריכים בטופס
        const daySel = document.getElementById('day'), monthSel = document.getElementById('month'), yearSel = document.getElementById('year');
        for(let i=1; i<=31; i++) daySel.options.add(new Option(i, i));
        for(let i=1; i<=12; i++) monthSel.options.add(new Option(i, i));
        const currYear = new Date().getFullYear();
        for(let i=currYear; i<=currYear+3; i++) yearSel.options.add(new Option(i, i));

        // פונקציות נגישות
        function toggleAccMenu() { document.getElementById('accWrapper').classList.toggle('acc-menu-open'); }
        function toggleLargeText() { document.documentElement.classList.toggle('large-text-active'); }
        function toggleContrast() { document.body.classList.toggle('high-contrast-active'); }
        function toggleHighlight() { document.body.classList.toggle('highlight-active'); }

        // לוגיקת שליחה לוואטסאפ
        function sendToWhatsapp(e) {
            e.preventDefault();
            const dateStr = `${daySel.value}/${monthSel.value}/${yearSel.value}`;
            const msg = `✨ *בקשה חדשה לסנאפבוקס* ✨\n\n` +
                        `👤 *שם:* ${document.getElementById('name').value}\n` +
                        `📞 *טלפון:* ${document.getElementById('phone').value}\n` +
                        `🎉 *אירוע:* ${document.getElementById('eventType').value}\n` +
                        `👥 *מוזמנים:* ${document.getElementById('guests').value || 'לא צוין'}\n` +
                        `📅 *תאריך:* ${dateStr}\n` +
                        `📝 *הערות:* ${document.getElementById('notes').value || 'אין'}`;
            window.open(`https://wa.me/972546056180?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
