<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Box | בוטיק עמדות צילום מעץ</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <!-- Font Awesome לאייקונים של רשתות חברתיות בצורה יציבה יותר -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --base-font-size: 16px; }
        html { font-size: var(--base-font-size); transition: font-size 0.3s ease; }
        body { 
            font-family: 'Assistant', sans-serif; 
            overflow-x: hidden; 
            scroll-behavior: smooth; 
            background-color: #FCFBFA; 
            color: #1A1A1A; 
            margin: 0;
            padding: 0;
        }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* גלריה אינסופית רספונסיבית */
        .marquee-container { 
            overflow: hidden; 
            width: 100%;
            padding: 2rem 0; 
            background: #fff; 
            white-space: nowrap;
            position: relative;
            display: flex;
        }

        .marquee-content { 
            display: flex; 
            gap: 15px;
            animation: scroll-left 45s linear infinite; 
            width: max-content;
        }

        .gallery-item {
            height: 380px;
            width: 270px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            flex-shrink: 0;
            background-color: #f3f3f3; /* פלייסולדר עד שהתמונה נטענת */
        }

        @media (max-width: 768px) {
            .gallery-item { height: 320px; width: 220px; }
            .marquee-content { animation-duration: 30s; }
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-50% - 7.5px)); }
        }

        /* נגישות */
        .large-text-active { --base-font-size: 20px; }
        .high-contrast-active { background-color: #000 !important; color: #fff !important; }
        .high-contrast-active .bg-white, .high-contrast-active .form-container, .high-contrast-active .marquee-container { background-color: #1a1a1a !important; color: #fff !important; border-color: #fff !important; }
        .highlight-active a, .highlight-active button { outline: 3px solid #D4AF37 !important; outline-offset: 4px !important; }

        /* תפריט נגישות */
        .acc-menu-open #accMainBtn { transform: rotate(180deg); }
        .acc-option { position: absolute; transition: all 0.4s ease; opacity: 0; pointer-events: none; transform: scale(0); }
        .acc-menu-open .acc-option { opacity: 1; pointer-events: auto; transform: scale(1); }
        .acc-menu-open .opt-1 { transform: translate(0, 70px); }
        .acc-menu-open .opt-2 { transform: translate(60px, 40px); }
        .acc-menu-open .opt-3 { transform: translate(70px, -15px); }

        /* כפתור וואטסאפ */
        .whatsapp-float { 
            position: fixed; 
            bottom: 25px; 
            left: 25px; 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 500; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            background-color: #25D366;
            color: white;
            transition: all 0.3s ease;
        }
        .whatsapp-float:hover { transform: scale(1.1); }

        .animate-fade-in { animation: fade-in 1s ease-out forwards; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- כפתור וואטסאפ -->
    <a href="https://wa.me/972546056180?text=היי%20מה%20נשמע%20רציתי%20לשמוע%20יותר%20על%20החבילות%20שלכם%20של%20העמדת%20צילום?" 
       class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <!-- נגישות -->
    <div id="accWrapper" class="fixed top-24 left-6 z-[400] flex flex-col items-center">
        <button onclick="toggleAccMenu()" id="accMainBtn" class="w-14 h-14 rounded-full bg-[#1A1A1A] text-white shadow-lg flex items-center justify-center border border-white/10">
            <i data-lucide="accessibility"></i>
        </button>
        <button onclick="toggleLargeText()" class="acc-option opt-1 bg-white text-black w-12 h-12 rounded-full shadow-md flex items-center justify-center border border-gray-100"><b>A+</b></button>
        <button onclick="toggleContrast()" class="acc-option opt-2 bg-white text-black w-12 h-12 rounded-full shadow-md flex items-center justify-center border border-gray-100"><i data-lucide="contrast" size="20"></i></button>
        <button onclick="toggleHighlight()" class="acc-option opt-3 bg-white text-black w-12 h-12 rounded-full shadow-md flex items-center justify-center border border-gray-100"><i data-lucide="eye" size="20"></i></button>
    </div>

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-[200] px-4 py-4 md:px-12">
        <nav class="max-w-7xl mx-auto flex justify-between items-center p-3 px-6 rounded-full bg-white/90 backdrop-blur-md shadow-sm border border-gray-100">
            <div class="flex items-center gap-3">
                <div class="text-[#D4AF37]">
                    <svg viewBox="0 0 100 100" class="h-8 w-8" fill="none" stroke="currentColor"><path d="M50 45 L35 75 M50 45 L65 75 M42 75 L58 75" stroke-width="3" stroke-linecap="round"/><rect x="30" y="30" width="40" height="25" rx="3" stroke-width="3"/><circle cx="50" cy="42" r="5" stroke-width="3"/></svg>
                </div>
                <div class="flex flex-col">
                    <span class="font-black uppercase text-sm md:text-base leading-none">Snap Box</span>
                    <span class="text-[8px] md:text-[10px] font-bold tracking-widest text-gray-500">עמדות צילום מעץ</span>
                </div>
            </div>
            <button onclick="document.getElementById('contact-form').scrollIntoView({behavior:'smooth'})" class="bg-[#1A1A1A] text-white rounded-full font-bold px-5 py-2 text-xs hover:bg-[#D4AF37] transition-all">דברו איתנו</button>
        </nav>
    </header>

    <!-- Hero -->
    <section class="pt-40 pb-12 px-6 text-center animate-fade-in">
        <span class="text-[#D4AF37] font-bold tracking-[0.3em] text-xs uppercase block mb-4">Pure Moments, Pure Wood</span>
        <h1 class="text-5xl md:text-8xl italic font-serif leading-tight">היופי שברגע <br /><span class="text-[#D4AF37] not-italic font-light">מעץ טבעי.</span></h1>
    </section>

    <!-- גלריה -->
    <div class="marquee-container">
        <div class="marquee-content" id="marquee-inner">
            <!-- רשימת המדיה -->
            <img src="photo_5893407665646406938_y.jpg" class="gallery-item" alt="עמדת סלפי">
            <video src="video_2025-11-02_20-35-12%20(13).mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5893407665646406939_y.jpg" class="gallery-item" alt="עמדת סלפי">
            <video src="document_6035350110911601688.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5893407665646406940_y.jpg" class="gallery-item" alt="עמדת סלפי">
            <video src="document_6035350110911601689.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_6035350111371595162_y.jpg" class="gallery-item" alt="עמדת סלפי">
            <video src="document_6035350110911601687.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <video src="document_6035350110911601690.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <video src="document_6035350110911601691.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <video src="document_6035350110911601692.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <video src="document_5893407665186412855.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <video src="document_5893407665186412857.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <video src="document_5893407665186412858.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <video src="document_5893407665186412859.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <video src="document_5893407665186412860.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5893407665646406936_y.jpg" class="gallery-item" alt="עמדת סלפי">
            <img src="photo_5893407665646406937_y.jpg" class="gallery-item" alt="עמדת סלפי">
        </div>
    </div>

    <!-- Form Section -->
    <section id="contact-form" class="py-20 px-4 md:px-6 max-w-5xl mx-auto">
        <div class="form-container bg-white p-8 md:p-16 rounded-[40px] shadow-xl border border-gray-50">
            <h2 class="text-3xl md:text-5xl font-serif italic text-center mb-12">השאירו פרטים</h2>
            <form onsubmit="sendToWhatsapp(event)" class="space-y-8 text-right">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="border-b pb-2"><label class="text-[#D4AF37] text-xs font-bold uppercase">שם מלא</label><input type="text" id="name" required class="w-full bg-transparent text-lg outline-none mt-1" placeholder="איך קוראים לכם?"></div>
                    <div class="border-b pb-2"><label class="text-[#D4AF37] text-xs font-bold uppercase">טלפון</label><input type="tel" id="phone" required class="w-full bg-transparent text-lg outline-none mt-1 text-left" placeholder="050-0000000"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="border-b pb-2"><label class="text-[#D4AF37] text-xs font-bold uppercase">סוג אירוע</label><select id="eventType" required class="w-full bg-transparent py-2 outline-none"><option value="" disabled selected>בחר/י</option><option>חתונה</option><option>בר/בת מצווה</option><option>עסקי</option><option>אחר</option></select></div>
                    <div class="border-b pb-2"><label class="text-[#D4AF37] text-xs font-bold uppercase">כמות מוזמנים</label><input type="number" id="guests" class="w-full bg-transparent py-2 outline-none"></div>
                    <div class="border-b pb-2"><label class="text-[#D4AF37] text-xs font-bold uppercase">תאריך</label>
                        <div class="flex gap-1"><select id="day" class="bg-transparent text-sm w-1/3"></select><select id="month" class="bg-transparent text-sm w-1/3"></select><select id="year" class="bg-transparent text-sm w-1/3"></select></div>
                    </div>
                </div>
                <button type="submit" class="w-full py-5 bg-[#1A1A1A] text-white rounded-xl text-lg font-bold hover:bg-[#D4AF37] transition-all">שלחו הודעה בוואטסאפ</button>
            </form>
        </div>
    </section>

   <div class="flex justify-center gap-12 py-10">
        <a href="https://www.instagram.com/snapbox_event.official?igsh=MWNlMHU1eXF4OXh6cA==" target="_blank" rel="noopener noreferrer" class="social-icon transition-all duration-300 transform hover:scale-125 hover:text-[#D4AF37] text-gray-400">
            <i data-lucide="instagram" style="width: 40px; height: 40px;"></i>
        </a>
        <a href="https://www.facebook.com/share/18GcWQXLqA/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" class="social-icon transition-all duration-300 transform hover:scale-125 hover:text-[#D4AF37] text-gray-400">
            <i data-lucide="facebook" style="width: 40px; height: 40px;"></i>
        </a>
    </div>
    <!-- Footer -->
    <footer class="py-12 text-center border-t border-gray-100">
        <p class="text-sm text-gray-400 font-bold">© 2026 SNAP BOX - כל הזכויות שמורות</p>
    </footer>

    <script>
        lucide.createIcons();

        // גלריה אינסופית
        const marquee = document.getElementById('marquee-inner');
        marquee.innerHTML += marquee.innerHTML;

        // תאריכים
        const d=document.getElementById('day'), m=document.getElementById('month'), y=document.getElementById('year');
        for(let i=1;i<=31;i++) d.options.add(new Option(i,i));
        for(let i=1;i<=12;i++) m.options.add(new Option(i,i));
        let cy=new Date().getFullYear();
        for(let i=cy;i<=cy+3;i++) y.options.add(new Option(i,i));

        // נגישות
        function toggleAccMenu() { document.getElementById('accWrapper').classList.toggle('acc-menu-open'); }
        function toggleLargeText() { document.documentElement.classList.toggle('large-text-active'); }
        function toggleContrast() { document.body.classList.toggle('high-contrast-active'); }
        function toggleHighlight() { document.body.classList.toggle('highlight-active'); }

        function sendToWhatsapp(e) {
            e.preventDefault();
            const msg = `היי, רציתי לשמוע על חבילות עמדת הצילום:\nשם: ${document.getElementById('name').value}\nטלפון: ${document.getElementById('phone').value}\nסוג אירוע: ${document.getElementById('eventType').value}\nתאריך: ${d.value}/${m.value}/${y.value}`;
            window.open(`https://wa.me/972546056180?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
